name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Validate release tag vs branch
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          # Post-v1.1 scheme (see .issueflows/04-designs-and-guides/cellpy-v2-branching.md):
          # v2 develops on master; 1.x maintenance lives on the v1.x branch.
          git fetch origin master v1.x

          on_branch() {
            git merge-base --is-ancestor HEAD "origin/$1"
          }

          if [[ "$TAG" =~ ^v1\. ]]; then
            on_branch v1.x || {
              echo "::error::1.x release $TAG must point to a commit on v1.x"
              exit 1
            }
          elif [[ "$TAG" =~ ^v2\. ]]; then
            on_branch master || {
              echo "::error::v2 release $TAG (stable or pre) must point to a commit on master"
              exit 1
            }
          else
            echo "::error::Tag $TAG is not allowed. Use v1.* (v1.x branch) or v2.* (master)."
            exit 1
          fi

  test:
    needs: validate
    runs-on: ubuntu-latest
    env:
      UV_NO_SOURCES: 1
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mdbtools

      - run: uv python install 3.13

      - name: Sync dependencies (PyPI cellpycore only)
        run: uv sync

      - name: Run tests
        run: uv run pytest -m essential --ignore=tests/test_plotutils_summary_plot.py

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
