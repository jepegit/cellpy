name: cellpy
channels:
    - conda-forge
dependencies:
    - python >= 3.13
    - charset-normalizer
    - cookiecutter
    - cryptography
    - dateparser
    - defusedxml
    - fabric
    - hdf5
    - ipykernel
    - ipython
    - ipywidgets
    - jinja2-time
    - lmfit
    - matplotlib
    - numpy >= 2.2.6
    - openpyxl
    - pandas >= 3.0.3,<4
    - pint
    - pip
    - platformdirs >= 4.10.0
    - plotly
    - polars
    - pyarrow >= 16
    - pydantic-settings >= 2.14.2
    - pygithub
    - pyodbc
    - pytables
    - python-box
    - python-dotenv
    - python-isal
    - requests
    - rich
    - ruamel.yaml
    - scipy
    - setuptools
    - sqlalchemy
    - sqlalchemy-access
    - tqdm
    - typer
    - xlrd
    - xmltodict
    - pip:
        # PyPI-only (no conda-forge package).
        - cellpycore==0.2.1
        # Optional external fastnda; cellpy defaults to cellpy.libs.local_fastnda.
        - fastnda
        # Old plotly kaleido 0.1.x (python-kaleido on conda-forge is 1.x).
        - kaleido==0.1.*
