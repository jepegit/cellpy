name: cellpy
channels:
    - conda-forge
dependencies:
    - click
    - cookiecutter
    - cryptography
    - dateparser
    - fabric
    - hdf5
    - ipykernel
    - ipython
    - ipywidgets
    - lmfit
    - matplotlib
    - numpy >= 2.2.6
    - openpyxl
    - pandas < 3
    - pint
    - pip
    - plotly
    - pygithub
    - pyodbc
    - pytables
    - python-box
    - python-dotenv
    - python >= 3.13
    - requests
    - rich
    - ruamel.yaml
    - scipy
    - setuptools
    - sqlalchemy
    - sqlalchemy-access
    - tqdm
    - xlrd
# This version of kaleido is not available for macOS M-chip:
    - kaleido==0.1.*
    - jinja2_time
    - charset-normalizer
    - pip:
        - fastnda
        - pyarrow>=23
        # cellpy-core is consumed as a git dependency until it is released on PyPI.
        - cellpycore @ git+https://github.com/cellpy/cellpy-core.git@main


