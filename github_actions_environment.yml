name: cellpy_dev
channels:
    - conda-forge
    - defaults
dependencies:
    - python
    - PyGithub
    - charset-normalizer
    - cookiecutter
    - coverage
    - cryptography
    - dateparser
    - defusedxml
    - fabric
    - hdf5
    - jinja2-time
    - lmfit
    - matplotlib
    - nbmake
    - numpy >= 2.2.6
    - openpyxl
    - pandas >= 3.0.3,<4
    - pint
    - pip
    - platformdirs >= 4.10.0
    - plotly
    - polars
    - pyarrow >= 16
    - pydantic-settings >= 2.14.2
    - pyodbc
    - pytables
    - pytest
    - pytest-benchmark
    - pytest-timeout
    - python-isal
    - requests
    - rich
    - scipy
    - setuptools
    - sqlalchemy
    - sqlalchemy-access
    - tqdm
    - typer
    - xlrd
    - xmltodict
    - pip:
        # PyPI-only (no conda-forge package).
        - cellpycore==0.2.1
        # Optional external fastnda; cellpy defaults to cellpy.libs.local_fastnda.
        - fastnda
