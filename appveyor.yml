build: false

image: Visual Studio 2022

environment:
  MINICONDA: C:\Miniconda3-x64
  PYTHON_ARC: "64"
  ACE_INSTALLER: C:\projects\cellpy\AccessDatabaseEngine_X64.exe
  matrix:
    - PYTHON_VERSION: "3.12"

# Cache the ACE installer between builds so we don't re-download ~30 MB every run.
# Invalidated automatically when appveyor.yml changes.
cache:
  - C:\projects\cellpy\AccessDatabaseEngine_X64.exe -> appveyor.yml

init:
  - "ECHO %PYTHON_VERSION% %MINICONDA% %PYTHON_ARC%"

install:
  # Install Microsoft Access Database Engine 2016 (x64) so pyodbc can open
  # Arbin .res files. AppVeyor images do NOT ship this driver. The /quiet
  # switch also bypasses the side-by-side bitness conflict if Office is
  # ever pre-installed on the image.
  - ps: |
      if (-not (Test-Path $env:ACE_INSTALLER)) {
        Write-Host "Downloading Access Database Engine 2016 x64..."
        $url = 'https://download.microsoft.com/download/3/5/C/35C84C36-661A-44E6-9324-8786B8DBE231/accessdatabaseengine_X64.exe'
        (New-Object Net.WebClient).DownloadFile($url, $env:ACE_INSTALLER)
      } else {
        Write-Host "Using cached ACE installer."
      }
      $proc = Start-Process -FilePath $env:ACE_INSTALLER -ArgumentList '/quiet','/norestart' -Wait -PassThru
      Write-Host "ACE installer exit code: $($proc.ExitCode)"
      if ($proc.ExitCode -ne 0) { throw "ACE install failed" }
  - mkdir C:\Users\appveyor\.conda
  - call %MINICONDA%\Scripts\activate.bat
  - conda config --set always_yes yes --set changeps1 no
  - conda update -q conda
  - conda info -a
  - conda env create -f github_actions_environment.yml python=%PYTHON_VERSION%
  - activate cellpy_dev

# test_plotutils_summary_plot is intentionally excluded everywhere in CI
# (matplotlib backend / display issues unrelated to data loading); match
# the pattern used in .github/workflows/*.yml.
test_script:
  - pytest --ignore=tests/test_plotutils_summary_plot.py

#test_script:
  # Put your test command here.
  # If you don't need to build C extensions on 64-bit Python 3.3 or 3.4,
