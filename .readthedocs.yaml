# Read the Docs configuration for the Zensical-built documentation.
# Reference: https://docs.readthedocs.com/platform/stable/intro/zensical.html
#
# The build needs only zensical and the mkdocstrings handler — not cellpy and
# not its dependencies. mkdocstrings reads the source with Griffe (static
# analysis), and the example notebooks are rendered to committed markdown
# beforehand (dev/render_example_notebooks.py), so nothing here has to import
# cellpy or execute a notebook.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    install:
      - pip install zensical mkdocstrings-python
    build:
      html:
        - zensical build --clean
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      - cp --recursive site/* $READTHEDOCS_OUTPUT/html/
