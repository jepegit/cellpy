name: cellpy_dev_313
channels:
    - conda-forge
dependencies:
    - python=3.13
    - PyGithub
    - black
    - click
    - cookiecutter
    - coverage
    - cryptography
    - dateparser
    - fabric
    - graphviz
    - hdf5
    - invoke
    - ipykernel
    - ipython
    - ipywidgets
    - jupyterlab
    - lmfit
    - matplotlib
    - myst-parser
    - nbmake
    - nbsphinx
    - nox
    - numpy >= 2.2.6
    - openpyxl
    - pandas < 3
    - pandoc
    - pint
    - pip
    - plotly
    - pyodbc
    - pytables
    - pytest
    - pytest-benchmark
    - pytest-timeout
    - python-box
    - python-dotenv
    - requests
    - rich
    - ruamel.yaml
    - scipy
    - seaborn
    - setuptools
    - sphinx
    - sphinx-autoapi
    - sphinx_rtd_theme
    - sqlalchemy
    - sqlalchemy-access
    - tqdm
    - twine
    - xlrd
    - charset-normalizer
    - pip:
        - fastnda
        - pyarrow>=23
        # bumpver is installed via pip because its dependency `lexid` has no
        # conda-forge build for Python 3.13 (pure-Python, so pip works fine).
        - bumpver
        - bump-my-version
        - isort
        - jinja2_time
        - jupyterlab-code-formatter
        - kaleido==0.1.*
        - myst_nb
        - pip-tools
        - pipdeptree
        - pydeps
        - sphinx-book-theme
        # cellpy-core is consumed as a git dependency until it is released on PyPI.
        # For dual-repo development install it editable instead: pip install -e ../cellpy-core
        - cellpycore @ git+https://github.com/cellpy/cellpy-core.git@main


