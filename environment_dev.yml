name: cellpy_dev_313
channels:
    - conda-forge
dependencies:
    - python=3.13
    - PyGithub
    - black
    - cellpycore ==0.2.3
    - cookiecutter
    - coverage
    - cryptography
    - dateparser
    - defusedxml
    - graphviz
    - hdf5
    - ipykernel
    - ipython
    - ipywidgets
    - jinja2-time
    - jupyterlab
    - lmfit
    - matplotlib
    - myst-parser
    - nbmake
    - nbsphinx
    - nox
    - numpy >= 2.2.6
    - openpyxl
    - pandas >= 3.0.3,<4
    - pandoc
    - pint
    - pip
    - platformdirs >= 4.10.0
    - plotly
    - polars
    - pyarrow >= 16
    - pydantic-settings >= 2.14.2
    - pyodbc
    - pytables
    - pytest
    - pytest-benchmark
    - pytest-timeout
    - python-isal
    - pyyaml
    - paramiko >= 5.0.0
    - universal-pathlib >= 0.3.10
    - requests
    - rich
    - scipy
    - seaborn
    - setuptools
    - sphinx
    - sphinx-autoapi
    - sphinx_rtd_theme
    - sqlalchemy
    - sqlalchemy-access
    - tqdm
    - twine
    - typer
    - xlrd
    - xmltodict
    - charset-normalizer
    - pip:
        # Optional external fastnda; cellpy defaults to cellpy.libs.local_fastnda.
        - fastnda
        # Old plotly kaleido 0.1.x (python-kaleido on conda-forge is 1.x).
        - kaleido==0.1.*
        # Docs extras not needed for runtime/CI.
        - myst_nb
        - sphinx-book-theme
